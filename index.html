// ============================================
// アフィリエイト設定（収益化）
// 楽天アフィリエイトID・Amazonアソシエイトタグをセットするとリンクが収益化されます
// 空文字("")のままなら通常の検索リンクとして動作します
// ============================================
const AFFILIATE = {
  rakutenId: "557bdb12.7c2cb6b9.557bdb13.16df9114",   // 例: "1a2b3c4d.5e6f7g8h.1a2b3c4d.5e6f7g8i"
  amazonTag: "",   // 例: "yourname-22"
};

// ---------- state ----------
let S = {
  step: 1, wineType: "", country: "", grape: "",
  pricePreset: "", customPrice: "", occasion: "", mood: "",
  wines: null, excluded: [], priceRelaxed: false, error: ""
};

// ---------- helpers ----------
function countWinesForCountry(type, c) {
  return WINE_DB.filter(w => w.type === type && (!c.regions || c.regions.some(r => w.region.includes(r)))).length;
}
function countWinesForGrape(type, g, countryId) {
  const c = COUNTRIES.find(x => x.id === countryId);
  const regions = c ? c.regions : null;
  return WINE_DB.filter(w => {
    if (w.type !== type) return false;
    if (regions && !regions.some(r => w.region.includes(r))) return false;
    if (g === "何でも良い") return true;
    if (type === "sparkling" && SPARKLING_STYLE_REGIONS[g]) return SPARKLING_STYLE_REGIONS[g].some(r => w.region.includes(r));
    return w.grape === g;
  }).length;
}
function priceRange() {
  let min = 0, max = 999999;
  const p = PRICE_PRESETS.find(x => x.value === S.pricePreset);
  if (p) { min = p.min; max = p.max; }
  else if (S.customPrice) {
    const nums = (S.customPrice.match(/\d+/g) || []).map(Number);
    if (nums.length >= 2) { min = Math.min(...nums); max = Math.max(...nums); }
    else if (nums.length === 1) {
      const n = nums[0] * (S.customPrice.includes("万") ? 10000 : 1);
      if (/以内|以下|まで|未満/.test(S.customPrice)) max = n;
      else if (/以上|から|〜/.test(S.customPrice)) min = n;
      else { min = Math.floor(n * 0.7); max = Math.ceil(n * 1.3); }
    }
  }
  return { min, max };
}
function pickWines({ type, grape, country, priceMin, priceMax, occasion, mood, exclude = [] }) {
  const countryObj = COUNTRIES.find(c => c.id === country);
  const regions = countryObj ? countryObj.regions : null;
  const mCountry = w => !regions || regions.some(r => w.region.includes(r));
  const mGrape = w => {
    if (!grape || grape === "何でも良い") return true;
    if (type === "sparkling" && SPARKLING_STYLE_REGIONS[grape]) return SPARKLING_STYLE_REGIONS[grape].some(r => w.region.includes(r));
    return w.grape === grape;
  };
  const notEx = w => !exclude.includes(w.name);

  let priceRelaxed = false;
  let cands = WINE_DB.filter(w => w.type === type && mGrape(w) && mCountry(w) && w.price >= priceMin && w.price <= priceMax && notEx(w));
  if (cands.length === 0 && exclude.length > 0) {
    cands = WINE_DB.filter(w => w.type === type && mGrape(w) && mCountry(w) && w.price >= priceMin && w.price <= priceMax);
  }
  if (cands.length === 0) {
    priceRelaxed = true;
    cands = WINE_DB.filter(w => w.type === type && mGrape(w) && mCountry(w) && notEx(w));
    if (cands.length === 0) cands = WINE_DB.filter(w => w.type === type && mGrape(w) && mCountry(w));
  }
  if (cands.length === 0) return { picks: [], priceRelaxed };

  const moodLower = (mood || "").toLowerCase();
  const occasionTagMap = {
    "日常の晩酌": ["デイリー", "コスパ良", "食事向き"],
    "記念日・特別な日": ["記念日", "プレミアム", "エレガント", "シャンパーニュ"],
    "食事に合わせて": ["食事向き", "肉料理", "魚介"],
    "贈り物": ["贈り物向き", "プレミアム", "ギフト向き"],
    "パーティー": ["パーティー", "乾杯", "フレッシュ"],
  };
  const wantedTags = occasionTagMap[occasion] || [];
  const moodKeywords = [
    { kw: ["肉", "ステーキ", "焼肉", "bbq"], tag: ["肉料理", "フルボディ"] },
    { kw: ["魚", "刺身", "寿司", "シーフード", "貝"], tag: ["魚介", "爽やか"] },
    { kw: ["甘", "デザート", "スイーツ"], tag: ["甘口", "デザート"] },
    { kw: ["軽", "さっぱり", "あっさり"], tag: ["軽め", "爽やか", "フレッシュ"] },
    { kw: ["重", "濃厚", "がっつり"], tag: ["フルボディ", "濃密"] },
    { kw: ["華", "豪華", "贅沢"], tag: ["華やか", "プレミアム", "エレガント"] },
  ];
  const scored = cands.map(w => {
    let score = 0;
    wantedTags.forEach(t => { if (w.tags.includes(t)) score += 2; });
    moodKeywords.forEach(({ kw, tag }) => {
      if (kw.some(k => moodLower.includes(k))) tag.forEach(t => { if (w.tags.includes(t)) score += 3; });
    });
    score += Math.random();
    return Object.assign({}, w, { _score: score });
  }).sort((a, b) => b._score - a._score);

  return { picks: scored.slice(0, 3), priceRelaxed };
}
function rakutenUrl(name) {
  const u = "https://search.rakuten.co.jp/search/mall/" + encodeURIComponent(name + " ワイン") + "/";
  return AFFILIATE.rakutenId
    ? "https://hb.afl.rakuten.co.jp/hgc/" + AFFILIATE.rakutenId + "/?pc=" + encodeURIComponent(u) + "&m=" + encodeURIComponent(u)
    : u;
}
function amazonUrl(name) {
  return "https://www.amazon.co.jp/s?k=" + encodeURIComponent(name + " ワイン") + (AFFILIATE.amazonTag ? "&tag=" + AFFILIATE.amazonTag : "");
}
function typeObj() { return WINE_TYPES.find(t => t.id === S.wineType); }
function canProceed() {
  if (S.step === 1) return !!S.wineType;
  if (S.step === 2) return !!S.country;
  if (S.step === 3) return !!S.grape;
  if (S.step === 4) return !!(S.pricePreset || S.customPrice);
  if (S.step === 5) return true;
  return false;
}
function priceLabelText() {
  const p = PRICE_PRESETS.find(x => x.value === S.pricePreset);
  return p ? p.label : (S.customPrice || "");
}
function stepLabel(n) {
  if (S.wineType !== "sparkling") return "STEP " + n;
  return "STEP " + (n >= 3 ? n - 1 : n);
}

// ---------- rendering ----------
function render() {
  const el = document.getElementById("app");
  if (!el) return;
  let h = "";

  if (S.step < 6) {
    const bars = S.wineType === "sparkling" ? [1, 3, 4, 5] : [1, 2, 3, 4, 5];
    h += '<div class="indicator">' + bars.map(s => '<div class="bar' + (s <= S.step ? " on" : "") + '"></div>').join("") + "</div>";
  }

  if (S.step === 1) {
    h += '<div class="fade"><div class="stepLabel">STEP 1</div><div class="q">ワインの種類は？</div><div class="typeList">';
    WINE_TYPES.forEach(t => {
      const sel = S.wineType === t.id;
      h += '<button class="typeBtn' + (sel ? " sel" : "") + '" data-action="type" data-id="' + t.id + '" style="--c:' + t.color + ';--cbg:' + t.color + '18">'
        + '<span class="ticon">' + t.icon + '</span><span class="tlabel">' + t.label + '</span>'
        + (sel ? '<span class="check" style="color:' + t.color + '">✓</span>' : "")
        + "</button>";
    });
    h += "</div></div>";
  }

  if (S.step === 2) {
    h += '<div class="fade"><div class="stepLabel">STEP 2</div><div class="q">産地は？</div><div class="sub">飲みたいワインの国・地域</div><div class="chips">';
    COUNTRIES.forEach(c => {
      const n = countWinesForCountry(S.wineType, c);
      const dis = n === 0;
      const sel = S.country === c.id;
      h += '<button class="chip' + (sel ? " sel" : "") + (dis ? " dis" : "") + '" data-action="country" data-id="' + c.id + '"' + (dis ? " disabled" : "") + ">"
        + '<span class="cicon">' + c.icon + "</span> " + c.label + "</button>";
    });
    h += "</div></div>";
  }

  if (S.step === 3) {
    const q = S.wineType === "sparkling" ? "スタイルは？" : "ブドウ品種は？";
    const sub = S.wineType === "sparkling" ? "スタイルを選んでください" : (typeObj() ? typeObj().label : "") + "の主な品種";
    h += '<div class="fade"><div class="stepLabel">' + stepLabel(3) + '</div><div class="q">' + q + '</div><div class="sub">' + sub + '</div><div class="chips">';
    (GRAPES[S.wineType] || []).forEach(g => {
      const n = countWinesForGrape(S.wineType, g, S.country || "any");
      const dis = n === 0;
      const sel = S.grape === g;
      h += '<button class="chip' + (sel ? " sel" : "") + (dis ? " dis" : "") + '" data-action="grape" data-id="' + g + '"' + (dis ? " disabled" : "") + ">" + g + "</button>";
    });
    h += "</div></div>";
  }

  if (S.step === 4) {
    h += '<div class="fade"><div class="stepLabel">' + stepLabel(4) + '</div><div class="q">予算は？</div><div class="presets">';
    PRICE_PRESETS.forEach(p => {
      const sel = S.pricePreset === p.value;
      h += '<button class="preset' + (sel ? " sel" : "") + '" data-action="preset" data-value="' + p.value + '">' + p.label + "</button>";
    });
    h += '</div><div class="or">または自由入力</div>';
    h += '<input id="customPrice" class="input' + (S.customPrice ? " filled" : "") + '" type="text" placeholder="例: 3000円前後、1万円以内..." value="' + S.customPrice.replace(/"/g, "&quot;") + '">';
    h += "</div>";
  }

  if (S.step === 5) {
    h += '<div class="fade"><div class="stepLabel">' + stepLabel(5) + '</div><div class="q">今日の気分・シーンは？</div><div class="sub">任意でOK、スキップもできます</div><div class="chips occ">';
    OCCASIONS.forEach(o => {
      const sel = S.occasion === o;
      h += '<button class="chip pill' + (sel ? " sel" : "") + '" data-action="occ" data-id="' + o + '">' + o + "</button>";
    });
    h += '</div><textarea id="mood" class="input area" rows="3" placeholder="気分、合わせたい料理、好みなど自由に...">' + S.mood.replace(/</g, "&lt;") + "</textarea></div>";
  }

  if (S.step === 6 && S.wines) {
    const c = COUNTRIES.find(x => x.id === S.country);
    const parts = [typeObj() ? typeObj().label : ""];
    if (S.wineType !== "sparkling" && c && c.id !== "any") parts.push(c.label);
    parts.push(S.grape, priceLabelText());
    h += '<div class="fade"><div class="eyebrow">Sommelier\'s Pick</div>';
    h += '<div class="q">あなたへのおすすめ ' + S.wines.length + "本</div>";
    h += '<div class="sub">' + parts.filter(Boolean).join(" · ") + "</div>";
    if (S.priceRelaxed) h += '<div class="notice">ご予算内に合うワインが見つからなかったため、近い価格帯からお選びしています。</div>';
    S.wines.forEach((w, i) => {
      h += '<div class="card" style="animation-delay:' + (i * 0.15) + 's">'
        + '<div class="cardTop"><div><div class="no">No.' + (i + 1) + ' Recommendation</div>'
        + '<div class="name">' + w.name + '</div>'
        + '<div class="prod">' + w.producer + " · " + w.region + "</div></div>"
        + '<div class="price">' + w.priceLabel + "</div></div>"
        + '<p class="desc">' + w.desc + "</p>"
        + '<div class="tags">' + w.tags.map(t => '<span class="tag">' + t + "</span>").join("") + "</div>"
        + '<div class="links">'
        + '<a class="rak" href="' + rakutenUrl(w.name) + '" target="_blank" rel="noopener noreferrer">楽天で探す</a>'
        + '<a class="amz" href="' + amazonUrl(w.name) + '" target="_blank" rel="noopener noreferrer">Amazonで探す</a>'
        + "</div></div>";
    });
    h += '<button class="rerollBtn" data-action="reroll">🎲 同じ条件でもう3本</button>';
    h += '<button class="resetBtn" data-action="reset">← もう一度探す</button></div>';
  }

  if (S.error) h += '<div class="err">' + S.error + "</div>";

  if (S.step < 6) {
    h += '<div class="nav">';
    if (S.step > 1) h += '<button class="backBtn" data-action="back">← 戻る</button>';
    if (S.step < 5) h += '<button id="nextBtn" class="nextBtn' + (canProceed() ? " on" : "") + '" data-action="next"' + (canProceed() ? "" : " disabled") + ">次へ →</button>";
    else h += '<button class="goBtn" data-action="go">ワインを選んでもらう 🍷</button>';
    h += "</div>";
  }

  el.innerHTML = h;
}

function updateNextBtn() {
  const b = document.getElementById("nextBtn");
  if (b) {
    const ok = canProceed();
    b.disabled = !ok;
    b.classList.toggle("on", ok);
  }
}

function recommend(excludeList) {
  S.error = "";
  const { min, max } = priceRange();
  const r = pickWines({
    type: S.wineType, grape: S.grape, country: S.country,
    priceMin: min, priceMax: max, occasion: S.occasion, mood: S.mood,
    exclude: excludeList
  });
  if (!r.picks.length) {
    S.error = "条件に合うワインが見つかりませんでした。条件を変えてみてください。";
    render();
    return;
  }
  S.wines = r.picks;
  S.priceRelaxed = r.priceRelaxed;
  S.step = 6;
  render();
  window.scrollTo(0, 0);
}

// ---------- events ----------
document.addEventListener("click", e => {
  const t = e.target.closest("[data-action]");
  if (!t || t.disabled) return;
  const a = t.dataset.action;
  if (a === "type") { S.wineType = t.dataset.id; S.grape = ""; S.country = ""; render(); }
  if (a === "country") { S.country = t.dataset.id; S.grape = ""; render(); }
  if (a === "grape") { S.grape = t.dataset.id; render(); }
  if (a === "preset") { S.pricePreset = t.dataset.value; S.customPrice = ""; render(); }
  if (a === "occ") { S.occasion = S.occasion === t.dataset.id ? "" : t.dataset.id; render(); }
  if (a === "next") {
    if (S.step === 1 && S.wineType === "sparkling") { S.country = "any"; S.step = 3; }
    else S.step += 1;
    render(); window.scrollTo(0, 0);
  }
  if (a === "back") {
    if (S.step === 3 && S.wineType === "sparkling") S.step = 1;
    else S.step -= 1;
    render(); window.scrollTo(0, 0);
  }
  if (a === "go") { S.excluded = []; recommend([]); }
  if (a === "reroll") {
    S.excluded = S.excluded.concat((S.wines || []).map(w => w.name));
    recommend(S.excluded);
  }
  if (a === "reset") {
    S = { step: 1, wineType: "", country: "", grape: "", pricePreset: "", customPrice: "", occasion: "", mood: "", wines: null, excluded: [], priceRelaxed: false, error: "" };
    render(); window.scrollTo(0, 0);
  }
});

document.addEventListener("input", e => {
  if (e.target.id === "customPrice") {
    S.customPrice = e.target.value;
    if (S.customPrice) {
      S.pricePreset = "";
      document.querySelectorAll(".preset").forEach(b => b.classList.remove("sel"));
    }
    e.target.classList.toggle("filled", !!S.customPrice);
    updateNextBtn();
  }
  if (e.target.id === "mood") S.mood = e.target.value;
});

render();

</script>
</div>
</body>
</html>
